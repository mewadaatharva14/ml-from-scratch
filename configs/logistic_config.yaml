# Logistic Regression — Sigmoid + BCE + L2 Regularization
# Breast Cancer Dataset (sklearn built-in)

data:
  test_size: 0.2
  random_seed: 42

model:
  weight_init_scale: 0.01

training:
  learning_rate: 0.1
  epochs: 1000
  log_interval: 100
  lambda_reg: 0.1            # L2 regularization strength
  threshold: 0.5             # decision boundary for binary prediction

reproducibility:
  random_seed: 42